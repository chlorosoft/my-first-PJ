<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Monster Hunter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; -webkit-tap-highlight-color: transparent; }
canvas { border: 1px solid #ffcc33; touch-action: none; max-width: 100vw; max-height: 100vh; width: auto; height: auto; }
#overlay {
  position: absolute; z-index: 2; color: #ffcc33; font-family: monospace;
  text-align: center; cursor: pointer; user-select: none;
  touch-action: none; -webkit-tap-highlight-color: transparent;
}
#overlay h1 { font-size: 48px; margin-bottom: 20px; text-shadow: 0 0 10px #ffcc33; }
#overlay p { font-size: 20px; animation: blink 1s infinite; }
@media (max-width: 600px) {
  #overlay h1 { font-size: 32px; margin-bottom: 12px; }
  #overlay p { font-size: 16px; }
}
@keyframes blink { 50% { opacity: 0.3; } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>よっちゃんの大冒険</h1>
  <p>CLICK TO START</p>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
canvas.width = 800;
canvas.height = 600;

// --- Game State ---
let monsters, bullets, explosions, player, gold, lives, level, gameOver, started;
const MONSTER_W = 32, MONSTER_H = 28;
const BULLET_W = 3, BULLET_H = 12;
const PLAYER_SIZE = 40;

function init() {
  gameOver = false;
  monsters = [];
  bullets = [];
  explosions = [];
  const rows = 5;
  const cols = 10;
  const startX = (canvas.width - cols * (MONSTER_W + 12)) / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      monsters.push({
        x: startX + c * (MONSTER_W + 12),
        y: 60 + r * (MONSTER_H + 16),
        alive: true,
        type: r < 1 ? 2 : r < 3 ? 1 : 0,
        anim: Math.random() * Math.PI * 2,
      });
    }
  }
  updateSpeeds();
  resetPlayer();
}

function resetPlayer() {
  player = { x: canvas.width / 2, y: canvas.height - 50, w: PLAYER_SIZE, h: PLAYER_SIZE };
}

function spawnBullets() {
  const alive = monsters.filter(m => m.alive);
  if (alive.length === 0) return;
  const count = Math.min(2, 1 + Math.floor(level / 2));
  for (let i = 0; i < count; i++) {
    const shooter = alive[Math.floor(Math.random() * alive.length)];
    bullets.push({ x: shooter.x + MONSTER_W / 2, y: shooter.y + MONSTER_H, alive: true });
  }
}

// --- Input ---
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key] = false; });

function startNewGame() {
  level = 1;
  lives = 3;
  gold = 0;
  init();
}

function handleOverlayTap() {
  if (!started) {
    started = true;
    startNewGame();
    overlay.style.display = 'none';
    loop();
  } else if (gameOver) {
    startNewGame();
    gameOver = false;
    moveTimer = 0;
    shootTimer = 0;
    lastTime = 0;
    overlay.style.display = 'none';
    loop();
  }
}
overlay.addEventListener('click', handleOverlayTap);
overlay.addEventListener('touchstart', (e) => { e.preventDefault(); handleOverlayTap(); }, { passive: false });

// --- Touch Controls ---
const touch = { left: false, right: false, shoot: false };
const touchBtns = { left: false, right: false, fire: false };

function getCanvasCoords(t) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (t.clientX - rect.left) * (canvas.width / rect.width),
    y: (t.clientY - rect.top) * (canvas.height / rect.height),
  };
}

function isLeft(b) {
  const cx = canvas.width * 0.17, cy = canvas.height * 0.82, r = Math.min(canvas.width, canvas.height) * 0.1;
  const dx = b.x - cx, dy = b.y - cy;
  return dx * dx + dy * dy < r * r;
}
function isRight(b) {
  const cx = canvas.width * 0.83, cy = canvas.height * 0.82, r = Math.min(canvas.width, canvas.height) * 0.1;
  const dx = b.x - cx, dy = b.y - cy;
  return dx * dx + dy * dy < r * r;
}
function isFire(b) {
  const cx = canvas.width * 0.83, cy = canvas.height * 0.18, r = Math.min(canvas.width, canvas.height) * 0.09;
  const dx = b.x - cx, dy = b.y - cy;
  return dx * dx + dy * dy < r * r;
}

function updateTouchBtns(touches) {
  touchBtns.left = false;
  touchBtns.right = false;
  touchBtns.fire = false;
  for (const t of touches) {
    const c = getCanvasCoords(t);
    if (isLeft(c)) touchBtns.left = true;
    if (isRight(c)) touchBtns.right = true;
    if (isFire(c)) touchBtns.fire = true;
  }
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  updateTouchBtns(e.touches);
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (e.touches.length === 0) {
    touchBtns.left = false;
    touchBtns.right = false;
    touchBtns.fire = false;
  } else {
    updateTouchBtns(e.touches);
  }
}, { passive: false });

canvas.addEventListener('touchcancel', (e) => {
  touchBtns.left = false;
  touchBtns.right = false;
  touchBtns.fire = false;
});

// Also support mouse for desktop testing
canvas.addEventListener('mousedown', (e) => {
  const c = getCanvasCoords(e);
  if (isLeft(c)) touchBtns.left = true;
  if (isRight(c)) touchBtns.right = true;
  if (isFire(c)) touchBtns.fire = true;
});
canvas.addEventListener('mouseup', () => {
  touchBtns.left = false;
  touchBtns.right = false;
  touchBtns.fire = false;
});

overlay.addEventListener('click', () => {
  if (!started) {
    started = true;
    startNewGame();
    overlay.style.display = 'none';
    loop();
  } else if (gameOver) {
    startNewGame();
    gameOver = false;
    moveTimer = 0;
    shootTimer = 0;
    lastTime = 0;
    overlay.style.display = 'none';
    loop();
  }
});

// --- Drawing ---
function drawMonster(m) {
  const colors = ['#cc66ff', '#ff6633', '#33ccff'];
  ctx.fillStyle = colors[m.type];
  const x = m.x, y = m.y;
  const bob = Math.sin(m.anim) * 2;

  // Head
  ctx.fillRect(x + 4, y + bob, 24, 20);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + 8, y + 4 + bob, 6, 6);
  ctx.fillRect(x + 18, y + 4 + bob, 6, 6);
  ctx.fillStyle = '#000';
  ctx.fillRect(x + 10, y + 6 + bob, 3, 3);
  ctx.fillRect(x + 20, y + 6 + bob, 3, 3);
  // Mouth
  ctx.fillStyle = colors[m.type];
  ctx.fillRect(x + 10, y + 14 + bob, 12, 3);
  // Teeth
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + 12, y + 14 + bob, 2, 2);
  ctx.fillRect(x + 18, y + 14 + bob, 2, 2);
  // Horns
  ctx.fillStyle = colors[m.type];
  ctx.fillRect(x + 4, y - 4 + bob, 4, 6);
  ctx.fillRect(x + 24, y - 4 + bob, 4, 6);
  // Arms
  ctx.fillRect(x - 4, y + 8 + bob, 6, 10);
  ctx.fillRect(x + 30, y + 8 + bob, 6, 10);
  // Feet
  ctx.fillRect(x + 6, y + 20 + bob, 6, 6);
  ctx.fillRect(x + 20, y + 20 + bob, 6, 6);
}

function drawWizard() {
  const x = player.x, y = player.y;

  // Cloak
  ctx.fillStyle = '#4444aa';
  ctx.beginPath();
  ctx.moveTo(x - 18, y + 4);
  ctx.lineTo(x + 18, y + 4);
  ctx.lineTo(x + 14, y - 12);
  ctx.lineTo(x - 14, y - 12);
  ctx.closePath();
  ctx.fill();

  // Head
  ctx.fillStyle = '#ffddbb';
  ctx.fillRect(x - 6, y - 20, 12, 12);

  // Hat
  ctx.fillStyle = '#3333cc';
  ctx.beginPath();
  ctx.moveTo(x - 16, y - 12);
  ctx.lineTo(x + 16, y - 12);
  ctx.lineTo(x, y - 32);
  ctx.closePath();
  ctx.fill();

  // Hat band
  ctx.fillStyle = '#ffcc33';
  ctx.fillRect(x - 14, y - 16, 28, 3);

  // Staff
  ctx.fillStyle = '#886633';
  ctx.fillRect(x + 14, y - 28, 3, 32);

  // Staff gem
  ctx.fillStyle = '#33ffcc';
  ctx.beginPath();
  ctx.arc(x + 15, y - 30, 4, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#333';
  ctx.fillRect(x - 3, y - 16, 2, 2);
  ctx.fillRect(x + 2, y - 16, 2, 2);
}

function drawHUD() {
  ctx.fillStyle = '#ffcc33';
  ctx.font = '20px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('\u{1FA99} ' + gold, 16, 30);
  ctx.textAlign = 'right';
  ctx.fillText(`WAVE ${level}`, canvas.width - 16, 30);
  ctx.textAlign = 'center';
  ctx.fillText('❤'.repeat(lives), canvas.width / 2, 30);
}

// --- Update ---
let moveTimer = 0;
let moveInterval = 0.5;
let shootTimer = 0;
let shootInterval = 1.5;
let dir = 1;

function updateSpeeds() {
  const total = 50;
  const alive = monsters.filter(m => m.alive).length;
  moveInterval = Math.max(0.08, 0.5 * (alive / total));
  shootInterval = Math.max(0.3, 1.5 - level * 0.1 - (total - alive) * 0.015);
}

function update(dt) {
  if (gameOver) return;

  // Player movement
  if (keys['ArrowLeft'] || keys['a'] || touchBtns.left) player.x -= 300 * dt;
  if (keys['ArrowRight'] || keys['d'] || touchBtns.right) player.x += 300 * dt;
  player.x = Math.max(PLAYER_SIZE / 2, Math.min(canvas.width - PLAYER_SIZE / 2, player.x));

  if (keys[' '] || keys['ArrowUp'] || touchBtns.fire) {
    const existing = bullets.find(b => b.alive && b.x > player.x - 5 && b.x < player.x + 5);
    if (!existing) {
      bullets.push({ x: player.x, y: player.y - 20, alive: true, player: true });
      keys[' '] = false;
      keys['ArrowUp'] = false;
    }
  }

  // Monster movement
  moveTimer += dt;
  if (moveTimer >= moveInterval) {
    moveTimer = 0;
    const alive = monsters.filter(m => m.alive);
    if (alive.length === 0) { level++; init(); updateSpeeds(); return; }
    let edge = false;
    for (const m of alive) {
      if ((dir > 0 && m.x + MONSTER_W >= canvas.width - 16) ||
          (dir < 0 && m.x <= 16)) { edge = true; break; }
    }
    if (edge) {
      dir *= -1;
      for (const m of alive) m.y += 20;
    } else {
      for (const m of alive) m.x += 12 * dir;
    }
  }

  // Monster animation
  for (const m of monsters) m.anim += dt * 3;

  // Monster shooting
  shootTimer += dt;
  if (shootTimer >= shootInterval) {
    shootTimer = 0;
    spawnBullets();
  }

  // Bullet update
  for (const b of bullets) {
    if (!b.alive) continue;
    b.y += (b.player ? -400 : 200) * dt;
    if (b.y < 0 || b.y > canvas.height) { b.alive = false; continue; }

    if (b.player) {
      for (const m of monsters) {
        if (!m.alive) continue;
        if (b.x >= m.x && b.x <= m.x + MONSTER_W && b.y >= m.y && b.y <= m.y + MONSTER_H) {
          m.alive = false;
          b.alive = false;
          gold += (3 - m.type) * 10;
          explosions.push({ x: m.x + MONSTER_W/2, y: m.y + MONSTER_H/2, t: 0.3 });
          break;
        }
      }
    } else {
      if (Math.abs(b.x - player.x) < PLAYER_SIZE / 2 && b.y >= player.y - 16 && b.y <= player.y) {
        b.alive = false;
        lives--;
        explosions.push({ x: player.x, y: player.y, t: 0.5 });
        if (lives <= 0) gameOver = true;
      }
    }
  }

  // Monster reaching bottom
  for (const m of monsters) {
    if (m.alive && m.y + MONSTER_H >= player.y) {
      gameOver = true;
    }
  }

  // Explosion update
  for (const e of explosions) e.t -= dt;
  explosions = explosions.filter(e => e.t > 0);
}

// --- Render ---
function render() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  skyGrad.addColorStop(0, '#87CEEB');
  skyGrad.addColorStop(0.6, '#B0E0E6');
  skyGrad.addColorStop(0.7, '#90B86a');
  skyGrad.addColorStop(1, '#6B8E3A');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Ground
  ctx.fillStyle = '#5a8a2a';
  ctx.fillRect(0, canvas.height * 0.7, canvas.width, canvas.height * 0.3);

  // Ground texture — small dots for grass
  ctx.fillStyle = '#4a7a20';
  for (let i = 0; i < 200; i++) {
    const gx = (i * 41 + 7) % canvas.width;
    const gy = canvas.height * 0.72 + (i * 37 + 11) % (canvas.height * 0.26);
    ctx.fillRect(gx, gy, 2, 2);
  }

  // Rocks
  const rockPositions = [[80, 460, 18], [300, 480, 14], [550, 450, 22], [700, 470, 12], [150, 520, 10], [450, 510, 16], [650, 530, 13]];
  ctx.fillStyle = '#7a7a7a';
  for (const [rx, ry, rr] of rockPositions) {
    ctx.beginPath();
    ctx.arc(rx, ry, rr, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#6a6a6a';
    ctx.beginPath();
    ctx.arc(rx - 2, ry - 2, rr * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#7a7a7a';
  }

  for (const m of monsters) if (m.alive) drawMonster(m);
  drawWizard();

  for (const b of bullets) {
    if (!b.alive) continue;
    if (b.player) {
      // Magic orb
      ctx.fillStyle = '#33ffcc';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(51,255,204,0.3)';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 8, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Fireball
      ctx.fillStyle = '#ff6633';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,102,51,0.3)';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 10, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  for (const e of explosions) {
    const maxT = e === explosions.find(x => x === e) ? 0.5 : 0.3;
    const alpha = e.t / maxT;
    ctx.strokeStyle = `rgba(255,200,50,${alpha})`;
    ctx.lineWidth = 2;
    const r = (1 - e.t / maxT) * 30 + 5;
    ctx.beginPath();
    ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Touch controls (semi-transparent circles)
  if (started && !gameOver) {
    const btnR = Math.min(canvas.width, canvas.height) * 0.1;
    ctx.globalAlpha = 0.2;
    // Left
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(canvas.width * 0.17, canvas.height * 0.82, btnR, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = btnR * 1.2 + 'px monospace';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = 0.4;
    ctx.fillText('◀', canvas.width * 0.17, canvas.height * 0.82);

    // Right
    ctx.beginPath();
    ctx.arc(canvas.width * 0.83, canvas.height * 0.82, btnR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillText('▶', canvas.width * 0.83, canvas.height * 0.82);

    // Fire
    ctx.beginPath();
    ctx.arc(canvas.width * 0.83, canvas.height * 0.18, Math.min(canvas.width, canvas.height) * 0.09, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = (Math.min(canvas.width, canvas.height) * 0.1) + 'px monospace';
    ctx.fillText('●', canvas.width * 0.83, canvas.height * 0.18);

    ctx.globalAlpha = 1;
  }

  drawHUD();

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff3333';
    ctx.font = '48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
    ctx.fillStyle = '#ffcc33';
    ctx.font = '24px monospace';
    ctx.fillText(`GOLD: ${gold}`, canvas.width/2, canvas.height/2 + 30);
    ctx.font = '18px monospace';
    ctx.fillText('CLICK TO RESTART', canvas.width/2, canvas.height/2 + 70);
  }
}

// --- Loop ---
let lastTime = 0;
function loop(time = 0) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  update(dt);
  render();
  if (!gameOver) requestAnimationFrame(loop);
}
</script>
</body>
</html>
