<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Monster Hunter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; -webkit-tap-highlight-color: transparent; }
canvas { border: 1px solid #ffcc33; touch-action: none; max-width: 100vw; max-height: 100vh; width: auto; height: auto; }
#overlay {
  position: absolute; z-index: 2; color: #ffcc33; font-family: monospace;
  text-align: center; cursor: pointer; user-select: none;
  touch-action: none; -webkit-tap-highlight-color: transparent;
}
#overlay h1 { font-size: 48px; margin-bottom: 10px; text-shadow: 2px 2px 4px #000, 0 0 15px #ffcc33; }
#overlay .subtitle { font-size: 28px; color: #aaa; margin-bottom: 30px; text-shadow: 1px 1px 3px #000; }
#overlay p { font-size: 20px; animation: blink 1s infinite; }
@media (max-width: 600px) {
  #overlay h1 { font-size: 32px; margin-bottom: 12px; }
  #overlay p { font-size: 16px; }
}
@keyframes blink { 50% { opacity: 0.3; } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>よっちゃんの大冒険</h1>
  <div class="subtitle">~ The Legend of the Wizard ~</div>
  <p>CLICK TO START</p>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
canvas.width = 800;
canvas.height = 600;

// --- Audio (Web Audio API) ---
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
// --- BGM (MML対応・安定版) ---
const NOTE_FREQ = { 'C':261.63,'D':293.66,'E':329.63,'F':349.23,'G':392.00,'A':440.00,'B':493.88 };
function mmlToNotes(mml) {
  const tokens = mml.trim().split(/\s+/);
  const notes = [];
  let currentNoteName = null;
  let currentOctave = 4;
  for (const t of tokens) {
    if (!t || t === 'R') continue;
    const noteMatch = t.match(/^([A-Ga-g])(\d)?$/);
    if (noteMatch) {
      currentNoteName = noteMatch[1].toUpperCase();
      if (noteMatch[2]) currentOctave = parseInt(noteMatch[2]);
      continue;
    }
    const durMatch = t.match(/^(\d+)$/);
    if (durMatch && currentNoteName) {
      let f = NOTE_FREQ[currentNoteName] || 0;
      f *= Math.pow(2, currentOctave - 4);
      notes.push({f, d: 4 / parseInt(durMatch[1])});
    }
  }
  return notes;
}

let bgmPlaying = false;
let bgmNodes = [];

const melodyNotes = mmlToNotes("C4 8 D5 8 E5 4 G5 2 R4 C5 8 D5 8 E5 4 G5 2 A5 4 G5 4 E5 4 C5 4");
const bassNotes   = mmlToNotes("C3 4 E3 4 G3 4 A3 4 C3 4 E3 4 G3 4 A3 4");

const bossMelodyNotes = mmlToNotes("A4 8 A4 8 G4 8 F4 8 E4 4 D4 4 C4 2");
const bossBassNotes   = mmlToNotes("A2 4 A2 4 E3 4 E3 4");

function stopBGM() {
  for (const n of bgmNodes) { try { n.stop(); } catch(e) {} }
  bgmNodes = [];
  bgmPlaying = false;
}

function playBGM() {
  if (bgmPlaying) return;
  ensureAudio();
  bgmPlaying = true;
  console.log('[BGM] Started | Melody:', melodyNotes.length, 'notes | Bass:', bassNotes.length);

  const bpm = 130;
  const beatDur = 60 / bpm;

  function schedulePhrase(startTime, notes, isBass) {
    let t = startTime;
    for (const n of notes) {
      const dur = n.d * beatDur;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      if (isBass) {
        osc.type = 'triangle';
        gain.gain.setValueAtTime(0.12, t);
        gain.gain.setValueAtTime(0.12, t + dur * 0.8);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      } else {
        osc.type = 'square';
        gain.gain.setValueAtTime(0.06, t);
        gain.gain.setValueAtTime(0.06, t + dur * 0.7);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      }

      osc.frequency.setValueAtTime(n.f, t);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + dur);
      bgmNodes.push(osc);
      t += dur;
    }
    return t;
  }

  function loopBGM() {
    if (!bgmPlaying) return;
    const now = audioCtx.currentTime + 0.1;
    let endT = now;
    const isBoss = (typeof boss !== 'undefined' && boss && boss.alive);
    endT = schedulePhrase(now, isBoss ? bossMelodyNotes : melodyNotes, false);
    schedulePhrase(now, isBoss ? bossBassNotes : bassNotes, true);
    const loopDur = endT - now;
    bgmTimer = setTimeout(() => { if (bgmPlaying) loopBGM(); }, loopDur * 1000);
  }

  let bgmTimer;
  loopBGM();
}

function playShoot() {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(880, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.1);
}

function playEnemyHit() {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(600, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.2);
}

function playPlayerHit() {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(200, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.4);
  g.gain.setValueAtTime(0.2, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.4);
}

function playStageClear() {
  ensureAudio();
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    const t = audioCtx.currentTime + i * 0.12;
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.connect(g).connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.15);
  });
}

function playBossDeath() {
  ensureAudio();
  const now = audioCtx.currentTime;
  // Deep rumbling bass
  for (let i = 0; i < 5; i++) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sawtooth';
    const t = now + i * 0.08;
    o.frequency.setValueAtTime(150 - i * 20, t);
    o.frequency.exponentialRampToValueAtTime(30, t + 0.8);
    g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
    o.connect(g).connect(audioCtx.destination);
    o.start(t); o.stop(t + 1.0);
  }
  // High crash
  for (let i = 0; i < 8; i++) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    const t = now + i * 0.05;
    o.frequency.setValueAtTime(800 + Math.random() * 1200, t);
    o.frequency.exponentialRampToValueAtTime(100, t + 0.6);
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    o.connect(g).connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.6);
  }
}

function createBossExplosion(cx, cy, isDragon) {
  const colors = isDragon
    ? ['#ff0000', '#ff3300', '#ff6600', '#ff9900', '#ffcc00', '#ffff00', '#ffffff']
    : ['#ffcc33', '#ff9933', '#ff6633', '#ff3333', '#ffffff'];
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 50 + Math.random() * 250;
    const size = 2 + Math.random() * 8;
    bossExplosions.push({
      x: cx,
      y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size,
      color: colors[Math.floor(Math.random() * colors.length)],
      t: 0.5 + Math.random() * 1.0,
      gravity: 100 + Math.random() * 150,
      type: Math.random() < 0.3 ? 'ring' : 'spark',
    });
  }
  // Shockwave rings
  for (let i = 0; i < 3; i++) {
    bossExplosions.push({
      x: cx,
      y: cy,
      vx: 0,
      vy: 0,
      size: 5,
      maxSize: 100 + i * 60,
      color: isDragon ? '#ff3300' : '#ffcc33',
      t: 0.8 - i * 0.15,
      type: 'shockwave',
    });
  }
  // Inner rings
  for (let i = 0; i < 2; i++) {
    bossExplosions.push({
      x: cx,
      y: cy,
      vx: 0,
      vy: 0,
      size: 5,
      maxSize: 60 + i * 40,
      color: isDragon ? '#ffff00' : '#ffcc33',
      t: 0.6 - i * 0.1,
      type: 'ring',
    });
  }
}

// --- Game State ---
let monsters, bullets, explosions, player, gold, lives, level, gameOver, started, victory;
let boss = null; // Added boss state
let bossesDefeated = 0; // Track boss defeats for day/night transition
let bossExplosions = []; // Big boss death effects
let screenFlash = 0; // Screen flash effect
// --- Credits ---
let creditsStarted = false;
let creditsOffset = 0;
let creditsFinished = false;
const CREDITS_SPEED = 30;
const CREDITS_DATA = [
  { role: '企画・制作', name: 'よっちゃん' },
  { role: 'プログラミング', name: 'よっちゃん' },
  { role: 'グラフィック', name: 'よっちゃん' },
  { role: '音楽・効果音', name: 'よっちゃん' },
  { role: 'スペシャルサンクス', name: 'みんなへ' },
];
// --- Credits BGM ---
let creditsBGMPlaying = false;
let creditsBGMTimer = null;
let creditsBGMNodes = [];

function stopCreditsBGM() {
  creditsBGMPlaying = false;
  if (creditsBGMTimer) clearTimeout(creditsBGMTimer);
  for (const n of creditsBGMNodes) { try { n.stop(); } catch(e) {} }
  creditsBGMNodes = [];
}

const creditsMelodyNotes = mmlToNotes("E5 4 G5 4 C5 4 E5 4 A4 4 C5 4 D5 4 E5 4 G4 4 A4 4 C5 4 E5 4 D5 4 C5 4");
const creditsBassNotes  = mmlToNotes("A4 4 E4 4 A4 4 E4 4 F4 4 C4 4 F4 4 C4 4 D4 4 A3 4 D4 4 A3 4 G4 4 E4 4 G4 4 E4 4");

function playCreditsBGM() {
  if (creditsBGMPlaying) return;
  ensureAudio();
  creditsBGMPlaying = true;
  const bpm = 120;
  const beatDur = 60 / bpm;

  function schedulePhrase(startTime, notes, isBass) {
    let t = startTime;
    for (const n of notes) {
      const dur = n.d * beatDur;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      if (isBass) {
        osc.type = 'triangle';
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.setValueAtTime(0.1, t + dur * 0.8);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      } else {
        osc.type = 'square';
        gain.gain.setValueAtTime(0.05, t);
        gain.gain.setValueAtTime(0.05, t + dur * 0.7);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      }
      osc.frequency.setValueAtTime(n.f, t);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + dur);
      creditsBGMNodes.push(osc);
      t += dur;
    }
    return t;
  }

  function loopBGM() {
    if (!creditsBGMPlaying) return;
    const now = audioCtx.currentTime + 0.1;
    let endT = now;
    endT = schedulePhrase(now, creditsMelodyNotes, false);
    schedulePhrase(now, creditsBassNotes, true);
    const loopDur = endT - now;
    creditsBGMTimer = setTimeout(() => { if (creditsBGMPlaying) loopBGM(); }, loopDur * 1000);
  }
  loopBGM();
}
const MONSTER_W = 32, MONSTER_H = 28;
// ...
const BULLET_W = 3, BULLET_H = 12;
const PLAYER_SIZE = 40;

function init() {
  gameOver = false;
  monsters = [];
  bullets = [];
  explosions = [];
  boss = null; // Reset boss
  const isBossWave = level % 3 === 0;

  if (isBossWave) {
    // Spawn Boss
    const isDragonBoss = level >= 9;
    boss = {
      x: canvas.width / 2,
      y: 50,
      vy: 40, // Added vertical velocity
      w: isDragonBoss ? 100 : 80,
      h: isDragonBoss ? 80 : 60,
      hp: isDragonBoss ? 15 + level * 5 + 20 : 15 + level * 5,
      maxHp: isDragonBoss ? 15 + level * 5 + 20 : 15 + level * 5,
      alive: true,
      dir: 1,
      anim: 0,
      isDragon: isDragonBoss
    };
  } else {
    // Regular wave
    const rows = 5;
    const cols = 10;
    const startX = (canvas.width - cols * (MONSTER_W + 12)) / 2;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        monsters.push({
          x: startX + c * (MONSTER_W + 12),
          y: 60 + r * (MONSTER_H + 16),
          alive: true,
          type: r < 1 ? 2 : r < 3 ? 1 : 0,
          anim: Math.random() * Math.PI * 2,
        });
      }
    }
  }
  updateSpeeds();
  resetPlayer();
}

function resetPlayer() {
  player = { x: canvas.width / 2, y: canvas.height - 50, w: PLAYER_SIZE, h: PLAYER_SIZE };
}

function spawnBullets() {
  const alive = monsters.filter(m => m.alive);
  if (alive.length === 0) return;
  const count = Math.min(2, 1 + Math.floor(level / 2));
  for (let i = 0; i < count; i++) {
    const shooter = alive[Math.floor(Math.random() * alive.length)];
    bullets.push({ x: shooter.x + MONSTER_W / 2, y: shooter.y + MONSTER_H, alive: true });
  }
}

// --- Input ---
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key] = false; });

function startNewGame() {
  level = 1;
  lives = 3;
  gold = 0;
  victory = false;
  bossesDefeated = 0;
  creditsStarted = false;
  creditsOffset = 0;
  creditsFinished = false;
  init();
}

function handleOverlayTap() {
  ensureAudio();
  if (!started) {
    started = true;
    startNewGame();
    overlay.style.display = 'none';
    playBGM();
    loop();
  } else if (gameOver) {
    if (victory && creditsFinished) {
      stopCreditsBGM();
      location.reload();
      return;
    }
    if (victory && !creditsFinished) {
      if (!creditsStarted) {
        // Start credits
        creditsStarted = true;
        creditsOffset = 0;
        lastRenderTime = performance.now();
        overlay.style.display = 'none';
        playCreditsBGM();
      }
      return;
    }
    stopBGM();
    startNewGame();
    moveTimer = 0;
    shootTimer = 0;
    lastTime = 0;
    overlay.style.display = 'none';
    playBGM();
    loop();
  }
}
overlay.addEventListener('click', handleOverlayTap);
overlay.addEventListener('touchstart', (e) => { e.preventDefault(); handleOverlayTap(); }, { passive: false });

// --- Touch Controls ---
const touch = { left: false, right: false, shoot: false };
const touchBtns = { left: false, right: false, fire: false };

function getCanvasCoords(t) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (t.clientX - rect.left) * (canvas.width / rect.width),
    y: (t.clientY - rect.top) * (canvas.height / rect.height),
  };
}

function isLeft(b) {
  const cx = canvas.width * 0.17, cy = canvas.height * 0.82, r = Math.min(canvas.width, canvas.height) * 0.1;
  const dx = b.x - cx, dy = b.y - cy;
  return dx * dx + dy * dy < r * r;
}
function isRight(b) {
  const cx = canvas.width * 0.83, cy = canvas.height * 0.82, r = Math.min(canvas.width, canvas.height) * 0.1;
  const dx = b.x - cx, dy = b.y - cy;
  return dx * dx + dy * dy < r * r;
}
function isFire(b) {
  const cx = canvas.width * 0.83, cy = canvas.height * 0.18, r = Math.min(canvas.width, canvas.height) * 0.09;
  const dx = b.x - cx, dy = b.y - cy;
  return dx * dx + dy * dy < r * r;
}

function updateTouchBtns(touches) {
  touchBtns.left = false;
  touchBtns.right = false;
  touchBtns.fire = false;
  for (const t of touches) {
    const c = getCanvasCoords(t);
    if (isLeft(c)) touchBtns.left = true;
    if (isRight(c)) touchBtns.right = true;
    if (isFire(c)) touchBtns.fire = true;
  }
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  updateTouchBtns(e.touches);
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (e.touches.length === 0) {
    touchBtns.left = false;
    touchBtns.right = false;
    touchBtns.fire = false;
  } else {
    updateTouchBtns(e.touches);
  }
}, { passive: false });

canvas.addEventListener('touchcancel', (e) => {
  touchBtns.left = false;
  touchBtns.right = false;
  touchBtns.fire = false;
});

// Also support mouse for desktop testing
canvas.addEventListener('mousedown', (e) => {
  const c = getCanvasCoords(e);
  if (isLeft(c)) touchBtns.left = true;
  if (isRight(c)) touchBtns.right = true;
  if (isFire(c)) touchBtns.fire = true;
});
canvas.addEventListener('mouseup', () => {
  touchBtns.left = false;
  touchBtns.right = false;
  touchBtns.fire = false;
});

// --- Drawing ---
function drawMonster(m) {
  const colors = ['#cc66ff', '#ff6633', '#33ccff'];
  ctx.fillStyle = colors[m.type];
  const x = m.x, y = m.y;
  const bob = Math.sin(m.anim) * 2;

  // Head
  ctx.fillRect(x + 4, y + bob, 24, 20);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + 8, y + 4 + bob, 6, 6);
  ctx.fillRect(x + 18, y + 4 + bob, 6, 6);
  ctx.fillStyle = '#000';
  ctx.fillRect(x + 10, y + 6 + bob, 3, 3);
  ctx.fillRect(x + 20, y + 6 + bob, 3, 3);
  // Mouth
  ctx.fillStyle = colors[m.type];
  ctx.fillRect(x + 10, y + 14 + bob, 12, 3);
  // Teeth
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + 12, y + 14 + bob, 2, 2);
  ctx.fillRect(x + 18, y + 14 + bob, 2, 2);
  // Horns
  ctx.fillStyle = colors[m.type];
  ctx.fillRect(x + 4, y - 4 + bob, 4, 6);
  ctx.fillRect(x + 24, y - 4 + bob, 4, 6);
  // Arms
  ctx.fillRect(x - 4, y + 8 + bob, 6, 10);
  ctx.fillRect(x + 30, y + 8 + bob, 6, 10);
  // Feet
  ctx.fillRect(x + 6, y + 20 + bob, 6, 6);
  ctx.fillRect(x + 20, y + 20 + bob, 6, 6);
}

function drawBoss(boss) {
  const x = boss.x, y = boss.y;
  const b = Math.sin(boss.anim) * 3;

  // HP Bar (drawn first so it appears behind)
  const barW = boss.isDragon ? 100 : 80;
  ctx.fillStyle = '#333';
  ctx.fillRect(x - barW / 2, y - 50, barW, 8);
  ctx.fillStyle = '#ff3330';
  const hpWidth = (boss.hp / boss.maxHp) * barW;
  ctx.fillRect(x - barW / 2, y - 50, hpWidth, 8);

  // Wave 9 boss = Dragon
  if (boss.isDragon) {
    drawDragon(x, y, b);
    return;
  }

  // Regular boss
  // Body (Large dark purple blob)
  ctx.fillStyle = '#4b0082';
  ctx.beginPath();
  ctx.arc(x, y + 20 + b, 40, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (Large glowing eyes)
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.arc(x - 20, y + 10 + b, 10, 0, Math.PI * 2);
  ctx.arc(x + 20, y + 10 + b, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x - 18, y + 8 + b, 4, 0, Math.PI * 2);
  ctx.arc(x + 18, y + 8 + b, 4, 0, Math.PI * 2);
  ctx.fill();
}

function drawDragon(x, y, bob) {
  const w = Math.sin(x * 0.05) * 5; // slight sway

  // Wings (behind body)
  const wingFlap = Math.sin(x * 0.08) * 15;
  ctx.fillStyle = '#8B0000';
  // Left wing
  ctx.beginPath();
  ctx.moveTo(x - 30, y + 10);
  ctx.lineTo(x - 90, y - 40 + wingFlap);
  ctx.lineTo(x - 70, y - 10 + wingFlap * 0.5);
  ctx.lineTo(x - 80, y + 20 + wingFlap);
  ctx.lineTo(x - 30, y + 20);
  ctx.closePath();
  ctx.fill();
  // Right wing
  ctx.beginPath();
  ctx.moveTo(x + 30, y + 10);
  ctx.lineTo(x + 90, y - 40 + wingFlap);
  ctx.lineTo(x + 70, y - 10 + wingFlap * 0.5);
  ctx.lineTo(x + 80, y + 20 + wingFlap);
  ctx.lineTo(x + 30, y + 20);
  ctx.closePath();
  ctx.fill();

  // Tail
  ctx.strokeStyle = '#8B0000';
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(x, y + 40);
  ctx.quadraticCurveTo(x + w + 20, y + 60, x + w + 35, y + 55);
  ctx.stroke();
  // Tail spike
  ctx.fillStyle = '#ff6600';
  ctx.beginPath();

  ctx.lineTo(x + w + 42, y + 50);
  ctx.lineTo(x + w + 40, y + 62);
  ctx.closePath();
  ctx.fill();

  // Body (large serpentine)
  ctx.fillStyle = '#CC0000';
  ctx.beginPath();
  ctx.ellipse(x, y + 15 + bob, 35, 45, 0, 0, Math.PI * 2);

  // Belly scales
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.ellipse(x, y + 20 + bob, 18, 30, 0, 0, Math.PI * 2);
  ctx.fill();

  // Neck
  ctx.fillStyle = '#CC0000';
  ctx.beginPath();
  ctx.ellipse(x, y - 25 + bob, 20, 18, 0, 0, Math.PI * 2);

  // Head
  ctx.fillStyle = '#aa0000';
  ctx.beginPath();
  ctx.ellipse(x, y - 45 + bob, 25, 20, 0, 0, Math.PI * 2);

  // Jaw
  ctx.fillStyle = '#880000';
  ctx.beginPath();
  ctx.ellipse(x, y - 35 + bob, 18, 8, 0, 0, Math.PI * 2);

  // Horns
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.moveTo(x - 15, y - 58 + bob);
  ctx.lineTo(x - 25, y - 85 + bob);
  ctx.lineTo(x - 8, y - 60 + bob);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 15, y - 58 + bob);
  ctx.lineTo(x + 25, y - 85 + bob);
  ctx.lineTo(x + 8, y - 60 + bob);
  ctx.closePath();
  ctx.fill();

  // Eyes (menacing)
  ctx.fillStyle = '#ffff00';
  ctx.beginPath();
  ctx.ellipse(x - 12, y - 48 + bob, 6, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + 12, y - 48 + bob, 6, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Pupils
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(x - 12, y - 48 + bob, 2, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + 12, y - 48 + bob, 2, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Nostrils (smoke)
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(x - 5, y - 40 + bob, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 5, y - 40 + bob, 2, 0, Math.PI * 2);
  ctx.fill();

  // Teeth
  ctx.fillStyle = '#fff';
  const teethY = y - 35 + bob;
  for (let i = -3; i <= 3; i++) {
    ctx.beginPath();
    ctx.moveTo(x + i * 5 - 2, teethY);
    ctx.lineTo(x + i * 5 + 2, teethY);
    ctx.lineTo(x + i * 5, teethY + 6);
    ctx.closePath();
    ctx.fill();
  }
}

function drawCredits(offset) {
  const centerX = canvas.width / 2;
  // 画面下部（canvas.height + 200）からスタートして上にスクロール
  const startY = canvas.height + 200 - offset;

  // Title (only when on-screen)
  if (startY > -60 && startY < canvas.height + 60) {
    ctx.fillStyle = '#ffcc33';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('THE END', centerX, startY);

    // Decorative line
    ctx.strokeStyle = '#ffcc33';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(centerX - 150, startY + 20);
    ctx.lineTo(centerX + 150, startY + 20);
    ctx.stroke();
  }

  // Credits entries
  ctx.font = '20px monospace';
  const lineHeight = 50;
  for (let i = 0; i < CREDITS_DATA.length; i++) {
    const entry = CREDITS_DATA[i];
    const y = startY + 80 + i * lineHeight;
    if (y < -30 || y > canvas.height + 60) continue;

    // Role (left-aligned, smaller)
    ctx.fillStyle = '#aaa';
    ctx.textAlign = 'right';
    ctx.fillText(entry.role + ' :', centerX - 10, y);

    // Name (right-aligned, larger, golden)
    ctx.fillStyle = '#ffcc33';
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(entry.name, centerX + 10, y);
    ctx.font = '20px monospace';
  }

  // Bottom message
  const msgY = startY + 80 + CREDITS_DATA.length * lineHeight + 40;
  if (msgY > -30 && msgY < canvas.height + 60) {
    ctx.fillStyle = '#ffcc33';
    ctx.font = '18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('CLICK TO TITLE', centerX, msgY);
  }
}

// --- Update ---
let moveTimer = 0;
let moveInterval = 0.5;
let shootTimer = 0;
let shootInterval = 1.5;
let dir = 1;

function updateSpeeds() {
  const total = 50;
  const alive = monsters.filter(m => m.alive).length;
  // レベルが上がるにつれて、移動間隔を短くしてスピードアップさせる
  moveInterval = Math.max(0.05, 0.5 * (alive / total) - level * 0.02);
  shootInterval = Math.max(0.3, 1.5 - level * 0.1 - (total - alive) * 0.015);
}

function update(dt) {
  if (gameOver) return;

  // Player movement
  if (keys['ArrowLeft'] || keys['a'] || touchBtns.left) player.x -= 300 * dt;
  if (keys['ArrowRight'] || keys['d'] || touchBtns.right) player.x += 300 * dt;
  player.x = Math.max(PLAYER_SIZE / 2, Math.min(canvas.width - PLAYER_SIZE / 2, player.x));

  if (keys[' '] || keys['ArrowUp'] || touchBtns.fire) {
    const existing = bullets.find(b => b.alive && b.x > player.x - 5 && b.x < player.x + 5);
    if (!existing) {
      bullets.push({ x: player.x, y: player.y - 20, alive: true, player: true });
      playShoot();
      keys[' '] = false;
      keys['ArrowUp'] = false;
    }
  }

  // Monster movement
  moveTimer += dt;
  if (moveTimer >= moveInterval) {
    moveTimer = 0;
    const alive = monsters.filter(m => m.alive);
    if (alive.length === 0 && !boss) {
      level++;
      init();
      updateSpeeds();
      playStageClear();
      return;
    }
    let edge = false;
    for (const m of alive) {
      if ((dir > 0 && m.x + MONSTER_W >= canvas.width - 16) ||
          (dir < 0 && m.x <= 16)) { edge = true; break; }
    }
    if (edge) {
      dir *= -1;
      for (const m of alive) m.y += 20;
    } else {
      for (const m of alive) m.x += 12 * dir;
    }
  }

  // Monster animation
  for (const m of monsters) m.anim += dt * 3;

  // Boss animation
  if (boss && boss.alive) boss.anim += dt * 2;

  // Monster shooting
  shootTimer += dt;
  if (shootTimer >= shootInterval) {
    shootTimer = 0;
    spawnBullets();
  }

  // Boss movement and attack
  if (boss && boss.alive) {
    boss.x += 100 * dir * dt;
    boss.y += boss.vy * dt; // Apply vertical velocity

    // Boundary check for horizontal movement
    if (boss.x + boss.w/2 >= canvas.width - 16 || boss.x - boss.w/2 <= 16) {
      dir *= -1;
    }

    // Boundary check for vertical movement
    if (boss.y < 20 || boss.y > canvas.height - boss.h - 50) {
      boss.vy *= -1; // Bounce vertically
    }

    boss.anim += dt * 3;

    // Random boss attack: spread shot
    if (Math.random() < 0.01) {
      for (let i = -1; i <= 1; i++) {
        bullets.push({
          x: boss.x,
          y: boss.y + boss.h/2,
          alive: true,
          player: false,
          vx: i * 100
        });
      }
    }

    // Standard boss downward shot
    if (Math.random() < 0.02) {
       bullets.push({ x: boss.x, y: boss.y + boss.h, alive: true, player: false });
    }
  }

  // Bullet update
  for (const b of bullets) {
    if (!b.alive) continue;
    b.y += (b.player ? -400 : 200) * dt;
    if (b.vx) b.x += b.vx * dt; // Handle spread shot vx
    if (b.y < 0 || b.y > canvas.height || b.x < 0 || b.x > canvas.width) { b.alive = false; continue; }

    if (b.player) {
      // Check monsters
      for (const m of monsters) {
        if (!m.alive) continue;
        if (b.x >= m.x && b.x <= m.x + MONSTER_W && b.y >= m.y && b.y <= m.y + MONSTER_H) {
          m.alive = false;
          b.alive = false;
          gold += (3 - m.type) * 10;
          explosions.push({ x: m.x + MONSTER_W/2, y: m.y + MONSTER_H/2, t: 0.3 });
          playEnemyHit();
          break;
        }
      }

      // Check boss
      if (boss && boss.alive && b.x >= boss.x - boss.w/2 && b.x <= boss.x + boss.w/2 && b.y >= boss.y && b.y <= boss.y + boss.h) {
        boss.hp--;
        b.alive = false;
        explosions.push({ x: boss.x, y: boss.y + boss.h/2, t: 0.3 });
        playEnemyHit();
        if (boss.hp <= 0) {
          boss.alive = false;
          gold += 100;
          bossesDefeated++;
          // Big boss explosion
          createBossExplosion(boss.x, boss.y + boss.h / 2, boss.isDragon);
          playBossDeath();
          screenFlash = 0.5;
if (level >= 9) {
            gameOver = true;
            victory = true;
            stopBGM();
            creditsStarted = true;
            creditsOffset = 0;
            creditsFinished = false;
            overlay.style.display = 'none';
            lastRenderTime = performance.now();
            playCreditsBGM();
          } else {
            setTimeout(() => {
              level++;
              init();
              updateSpeeds();
              playStageClear();
            }, 500);
          }
        }
      }
    } else {
      if (Math.abs(b.x - player.x) < PLAYER_SIZE / 2 && b.y >= player.y - 16 && b.y <= player.y) {
        b.alive = false;
        lives--;
        explosions.push({ x: player.x, y: player.y, t: 0.5 });
        playPlayerHit();
        if (lives <= 0) {
          gameOver = true;
          stopBGM();
          creditsStarted = false;
          creditsOffset = 0;
          creditsFinished = false;
          overlay.style.display = 'flex';
          overlay.innerHTML = '<h1>GAME OVER</h1><div class="subtitle">GOLD: ' + gold + '</div><p>CLICK TO RESTART</p>';
        }
      }
    }
  }

  // Monster reaching bottom
  for (const m of monsters) {
    if (m.alive && m.y + MONSTER_H >= player.y) {
      gameOver = true;
      stopBGM();
      creditsStarted = false;
      creditsOffset = 0;
      creditsFinished = false;
      overlay.style.display = 'flex';
      overlay.innerHTML = '<h1>GAME OVER</h1><div class="subtitle">GOLD: ' + gold + '</div><p>CLICK TO RESTART</p>';
    }
  }

  // Explosion update
  for (const e of explosions) e.t -= dt;
  explosions = explosions.filter(e => e.t > 0);

  // Boss explosion update
  for (const e of bossExplosions) {
    e.t -= dt;
    if (e.type === 'spark') {
      e.x += e.vx * dt;
      e.y += e.vy * dt;
      e.vy += e.gravity * dt;
      e.vx *= 0.98;
    } else if (e.type === 'ring') {
      e.size += (e.maxSize - e.size) * dt * 3;
    } else if (e.type === 'shockwave') {
      e.size += (e.maxSize - e.size) * dt * 2;
    }
  }
  bossExplosions = bossExplosions.filter(e => e.t > 0);

  // Screen flash decay
  if (screenFlash > 0) screenFlash -= dt;
}

function drawTitleBackground(time, brightness = 0) {
  // brightness: 0 = deep night, 1 = morning
  const isMorning = brightness >= 1;
  const t = Math.min(brightness, 1);

  // Sky gradient - night to morning
  const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  if (isMorning) {
    skyGrad.addColorStop(0, '#87CEEB');
    skyGrad.addColorStop(0.5, '#B0E0E6');
    skyGrad.addColorStop(0.75, '#E0F0FF');
    skyGrad.addColorStop(1, '#90EE90');
  } else {
    const r0 = Math.round(10 + 137 * t);
    const g0 = Math.round(10 + 157 * t);
    const b0 = Math.round(46 + 204 * t);
    const r1 = Math.round(26 + 142 * t);
    const g1 = Math.round(26 + 166 * t);
    const b1 = Math.round(78 + 180 * t);
    const r2 = Math.round(42 + 184 * t);
    const g2 = Math.round(58 + 197 * t);
    const b2 = Math.round(94 + 217 * t);
    const r3 = Math.round(26 + 158 * t);
    const g3 = Math.round(42 + 184 * t);
    const b3 = Math.round(26 + 144 * t);
    skyGrad.addColorStop(0, `rgb(${r0},${g0},${b0})`);
    skyGrad.addColorStop(0.5, `rgb(${r1},${g1},${b1})`);
    skyGrad.addColorStop(0.75, `rgb(${r2},${g2},${b2})`);
    skyGrad.addColorStop(1, `rgb(${r3},${g3},${b3})`);
  }
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars (fade out as brightness increases)
  if (!isMorning) {
    ctx.globalAlpha = Math.max(0, 1 - t * 2.5);
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 80; i++) {
      const sx = (i * 73 + 17) % canvas.width;
      const sy = (i * 47 + 13) % (canvas.height * 0.6);
      const twinkle = Math.sin(time * 2 + i) * 0.5 + 0.5;
      ctx.globalAlpha = Math.max(0, (0.3 + twinkle * 0.7) * (1 - t * 2.5));
      const size = (i % 3 === 0) ? 2 : 1;
      ctx.fillRect(sx, sy, size, size);
    }
    ctx.globalAlpha = 1;
  }

  // Sun (rises as brightness increases)
  if (isMorning || t > 0.3) {
    const sunAlpha = Math.min(1, (t - 0.3) * 2);
    const sunY = Math.max(30, 120 - t * 90);
    ctx.globalAlpha = sunAlpha;
    // Sun glow
    const sunGlow = ctx.createRadialGradient(650, sunY, 10, 650, sunY, 80);
    sunGlow.addColorStop(0, 'rgba(255,220,100,0.6)');
    sunGlow.addColorStop(1, 'rgba(255,220,100,0)');
    ctx.fillStyle = sunGlow;
    ctx.beginPath();
    ctx.arc(650, sunY, 80, 0, Math.PI * 2);
    ctx.fill();
    // Sun body
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(650, sunY, 35, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Moon (fades out as brightness increases)
  if (t < 0.7) {
    const moonAlpha = Math.max(0, 1 - (t - 0.3) * 3.3);
    ctx.globalAlpha = moonAlpha;
    ctx.fillStyle = '#ffffcc';
    ctx.beginPath();
    ctx.arc(650, 80, 35, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = isMorning ? '#87CEEB' : '#0a0a2e';
    ctx.beginPath();
    ctx.arc(640, 75, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Clouds (slow drift)
  if (isMorning) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
  } else if (t > 0.5) {
    const a = Math.round(40 + 215 * (t - 0.5));
    ctx.fillStyle = `rgba(${a},${a},${a},0.5)`;
  } else {
    ctx.fillStyle = 'rgba(40, 40, 80, 0.5)';
  }
  for (let i = 0; i < 3; i++) {
    const cx = ((i * 300 + time * (10 + i * 5)) % (canvas.width + 200)) - 100;
    const cy = 60 + i * 40;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 80, 20, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 40, cy - 10, 50, 15, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Far mountains
  if (isMorning) {
    ctx.fillStyle = '#6B8E9E';
  } else {
    const mr = Math.round(26 + 105 * t);
    const mg = Math.round(42 + 100 * t);
    const mb = Math.round(58 + 62 * t);
    ctx.fillStyle = `rgb(${mr},${mg},${mb})`;
  }
  ctx.beginPath();
  ctx.moveTo(0, canvas.height * 0.65);
  for (let x = 0; x <= canvas.width; x += 40) {
    const h = Math.sin(x * 0.008) * 50 + Math.sin(x * 0.015) * 30;
    ctx.lineTo(x, canvas.height * 0.55 - h);
  }
  ctx.lineTo(canvas.width, canvas.height * 0.65);
  ctx.closePath();
  ctx.fill();

  // Near mountains
  if (isMorning) {
    ctx.fillStyle = '#4A7A5A';
  } else {
    const nr = Math.round(21 + 100 * t);
    const ng = Math.round(32 + 100 * t);
    const nb = Math.round(26 + 74 * t);
    ctx.fillStyle = `rgb(${nr},${ng},${nb})`;
  }
  ctx.beginPath();
  ctx.moveTo(0, canvas.height * 0.7);
  for (let x = 0; x <= canvas.width; x += 30) {
    const h = Math.sin(x * 0.012 + 1) * 40 + Math.sin(x * 0.025) * 20;
    ctx.lineTo(x, canvas.height * 0.6 - h);
  }
  ctx.lineTo(canvas.width, canvas.height * 0.7);
  ctx.closePath();
  ctx.fill();

  // Castle silhouette (right side)
  const cx = 600, cy = canvas.height * 0.62;
  if (isMorning) {
    ctx.fillStyle = '#8B8682';
    ctx.fillRect(cx, cy - 40, 80, 40);
    ctx.fillRect(cx - 15, cy - 60, 20, 60);
    ctx.fillRect(cx + 75, cy - 60, 20, 60);
    ctx.beginPath();
    ctx.moveTo(cx - 15, cy - 60);
    ctx.lineTo(cx - 5, cy - 80);
    ctx.lineTo(cx + 5, cy - 60);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx + 75, cy - 60);
    ctx.lineTo(cx + 85, cy - 80);
    ctx.lineTo(cx + 95, cy - 60);
    ctx.closePath();
    ctx.fill();
    for (let i = 0; i < 5; i++) {
      ctx.fillRect(cx + i * 18, cy - 48, 10, 8);
    }
    // Warm window light
    ctx.fillStyle = '#FFD700';
    ctx.globalAlpha = 0.6 + Math.sin(time * 2) * 0.2;
    ctx.fillRect(cx + 35, cy - 30, 10, 14);
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = '#0a0a15';
  // Main body
  ctx.fillRect(cx, cy - 40, 80, 40);
  // Towers
  ctx.fillRect(cx - 15, cy - 60, 20, 60);
  ctx.fillRect(cx + 75, cy - 60, 20, 60);
  // Tower tops (pointed)
  ctx.beginPath();
  ctx.moveTo(cx - 15, cy - 60);
  ctx.lineTo(cx - 5, cy - 80);
  ctx.lineTo(cx + 5, cy - 60);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx + 75, cy - 60);
  ctx.lineTo(cx + 85, cy - 80);
  ctx.lineTo(cx + 95, cy - 60);
  ctx.closePath();
  ctx.fill();
  // Center top (battlements)
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(cx + i * 18, cy - 48, 10, 8);
  }
  // Window glow
  ctx.fillStyle = '#ffcc33';
  ctx.globalAlpha = 0.5 + Math.sin(time * 3) * 0.3;
  ctx.fillRect(cx + 35, cy - 30, 10, 14);
  ctx.globalAlpha = 1;
  }

  // Trees (left side)
  function drawTree(tx, ty, scale) {
    if (isMorning) {
      ctx.fillStyle = '#2d5a1e';
    } else {
      const tr = Math.round(10 + 45 * t);
      const tg = Math.round(21 + 60 * t);
      const tb = Math.round(10 + 10 * t);
      ctx.fillStyle = `rgb(${tr},${tg},${tb})`;
    }
    // Trunk
    ctx.fillRect(tx - 3 * scale, ty - 20 * scale, 6 * scale, 20 * scale);
    // Foliage layers
    if (isMorning) {
      ctx.fillStyle = '#3a7a2a';
    } else {
      const fr = Math.round(15 + 50 * t);
      const fg = Math.round(31 + 80 * t);
      const fb = Math.round(15 + 15 * t);
      ctx.fillStyle = `rgb(${fr},${fg},${fb})`;
    }
    ctx.beginPath();
    ctx.moveTo(tx, ty - 50 * scale);
    ctx.lineTo(tx - 18 * scale, ty - 15 * scale);
    ctx.lineTo(tx + 18 * scale, ty - 15 * scale);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(tx, ty - 65 * scale);
    ctx.lineTo(tx - 14 * scale, ty - 30 * scale);
    ctx.lineTo(tx + 14 * scale, ty - 30 * scale);
    ctx.closePath();
    ctx.fill();
  }
  drawTree(60, canvas.height * 0.72, 1.2);
  drawTree(130, canvas.height * 0.74, 0.9);
  drawTree(200, canvas.height * 0.73, 1.0);

  // Ground
  if (isMorning) {
    ctx.fillStyle = '#4a8a3a';
  } else {
    const gr = Math.round(26 + 130 * t);
    const gg = Math.round(42 + 118 * t);
    const gb = Math.round(21 + 30 * t);
    ctx.fillStyle = `rgb(${gr},${gg},${gb})`;
  }
  ctx.fillRect(0, canvas.height * 0.72, canvas.width, canvas.height * 0.28);

  // Grass tufts
  if (isMorning) {
    ctx.fillStyle = '#5aaa4a';
  } else {
    const gr2 = Math.round(26 + 130 * t);
    const gg2 = Math.round(58 + 90 * t);
    const gb2 = Math.round(21 + 15 * t);
    ctx.fillStyle = `rgb(${gr2},${gg2},${gb2})`;
  }
  for (let i = 0; i < 120; i++) {
    const gx = (i * 67 + 13) % canvas.width;
    const gy = canvas.height * 0.74 + (i * 43 + 17) % (canvas.height * 0.24);
    ctx.fillRect(gx, gy, 3, 4);
  }

  // Fireflies / morning butterflies
  for (const p of titleParticles) {
    if (isMorning) {
      // Butterflies
      const wing = Math.sin(time * 8 + p.phase) * 0.5 + 0.5;
      ctx.fillStyle = `rgba(255, ${150 + Math.floor(p.speed * 100)}, ${100 + Math.floor(p.r * 50)}, ${wing * 0.8})`;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r * 3 * wing, p.r, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      const glow = Math.sin(time * p.speed * 5 + p.phase) * 0.5 + 0.5;
      ctx.fillStyle = `rgba(200, 255, 100, ${glow * 0.7})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    // Move slowly
    p.y -= p.speed * 0.5;
    p.x += Math.sin(time + p.phase) * 0.2;
    if (p.y < -5) { p.y = canvas.height + 5; p.x = Math.random() * canvas.width; }
    if (p.x < -5) p.x = canvas.width + 5;
    if (p.x > canvas.width + 5) p.x = -5;
  }

  // Vignette
  const vigAlpha = isMorning ? 0.15 : 0.6;
  const vigGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.height*0.3, canvas.width/2, canvas.height/2, canvas.height*0.8);
  vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vigGrad.addColorStop(1, `rgba(0,0,0,${vigAlpha})`);
  ctx.fillStyle = vigGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// --- Render ---
function render(time = 0) {
  const t = time / 1000;

  // Background with day/night transition
  const brightness = bossesDefeated / 3;
  drawTitleBackground(t, brightness);

  if (!started) return;

  // Credits scroll and draw
  if (gameOver && creditsStarted && !creditsFinished) {
    const creditsDt = (time - lastRenderTime) / 1000;
    creditsOffset += CREDITS_SPEED * creditsDt;
    // スタッフロールの最後の行が画面の下を超えたら終了
    const creditsTotalHeight = 100 + 80 + CREDITS_DATA.length * 50 + 40;
    if (creditsOffset > canvas.height + 200 + creditsTotalHeight) {
      creditsFinished = true;
      overlay.style.display = 'flex';
      overlay.innerHTML = '<h1>THE END</h1><div class="subtitle">GOLD: ' + gold + '</div><p>CLICK TO TITLE</p>';
    }
    drawTitleBackground(time / 1000, bossesDefeated / 3);
    // Draw wizard character during credits
    const creditsWizardX = canvas.width / 2;
    const creditsWizardY = canvas.height - 50;
    const origPlayerX = player?.x || canvas.width / 2;
    const origPlayerY = player?.y || canvas.height - 50;
    player.x = creditsWizardX;
    player.y = creditsWizardY;
    drawWizard();
    player.x = origPlayerX;
    player.y = origPlayerY;
    drawCredits(creditsOffset);
    return;
  }
  if (gameOver) return;

  for (const m of monsters) if (m.alive) drawMonster(m);
  if (boss && boss.alive) drawBoss(boss);
  drawWizard();

  for (const b of bullets) {
    if (!b.alive) continue;
    if (b.player) {
      // Magic orb
      ctx.fillStyle = '#33ffcc';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(51,255,204,0.3)';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 8, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Fireball
      ctx.fillStyle = '#ff6633';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,102,51,0.3)';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 10, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  for (const e of explosions) {
    const maxT = e === explosions.find(x => x === e) ? 0.5 : 0.3;
    const alpha = e.t / maxT;
    ctx.strokeStyle = `rgba(255,200,50,${alpha})`;
    ctx.lineWidth = 2;
    const r = (1 - e.t / maxT) * 30 + 5;
    ctx.beginPath();
    ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Boss explosion effects
  for (const e of bossExplosions) {
    const alpha = Math.max(0, e.t);
    ctx.globalAlpha = alpha;
    if (e.type === 'spark') {
      // Glowing spark
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      ctx.fillStyle = e.color.replace(')', ',0.3)').replace('rgb', 'rgba');
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (e.type === 'ring') {
      // Expanding ring
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 3 * alpha;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
      ctx.stroke();
    } else if (e.type === 'shockwave') {
      // Shockwave ring
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 6 * alpha;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Touch controls (semi-transparent circles)
  if (started && !gameOver) {
    const btnR = Math.min(canvas.width, canvas.height) * 0.1;
    ctx.globalAlpha = 0.2;
    // Left
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(canvas.width * 0.17, canvas.height * 0.82, btnR, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = btnR * 1.2 + 'px monospace';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = 0.4;
    ctx.fillText('◀', canvas.width * 0.17, canvas.height * 0.82);

    // Right
    ctx.beginPath();
    ctx.arc(canvas.width * 0.83, canvas.height * 0.82, btnR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillText('▶', canvas.width * 0.83, canvas.height * 0.82);

    // Fire
    ctx.beginPath();
    ctx.arc(canvas.width * 0.83, canvas.height * 0.18, Math.min(canvas.width, canvas.height) * 0.09, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = (Math.min(canvas.width, canvas.height) * 0.1) + 'px monospace';
    ctx.fillText('●', canvas.width * 0.83, canvas.height * 0.18);

    ctx.globalAlpha = 1;
  }

  drawHUD();

  if (screenFlash > 0) {
    ctx.globalAlpha = screenFlash;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
  }

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (victory) {
      ctx.fillStyle = '#33ffcc';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('VICTORY!', canvas.width/2, canvas.height/2 - 20);
      ctx.fillStyle = '#ffcc33';
      ctx.font = '24px monospace';
      ctx.fillText(`GOLD: ${gold}`, canvas.width/2, canvas.height/2 + 30);
      ctx.font = '18px monospace';
      ctx.fillText('CLICK TO RESTART', canvas.width/2, canvas.height/2 + 70);
    } else {
      ctx.fillStyle = '#ff3333';
      ctx.font = '48px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
      ctx.fillStyle = '#ffcc33';
      ctx.font = '24px monospace';
      ctx.fillText(`GOLD: ${gold}`, canvas.width/2, canvas.height/2 + 30);
      ctx.font = '18px monospace';
      ctx.fillText('CLICK TO RESTART', canvas.width/2, canvas.height/2 + 70);
    }
  }
}

// --- Loop ---
let lastTime = 0;
let lastRenderTime = 0;
function loop(time = 0) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  update(dt);
  render(time);
  lastRenderTime = time;
  if (!gameOver || creditsStarted) requestAnimationFrame(loop);
}

// Title screen animation loop
function titleLoop(time = 0) {
  render(time);
  if (!started) requestAnimationFrame(titleLoop);
}
requestAnimationFrame(titleLoop);
</script>
